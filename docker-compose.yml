version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: callcrm
      POSTGRES_USER: callcrm
      POSTGRES_PASSWORD: callcrm_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5433"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callcrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://callcrm:callcrm_pass@postgres:5432/callcrm
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production-please
      - DEBUG=1
      - ALLOWED_HOSTS=*
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py loaddata fixtures/default_script.json &&
             python manage.py runserver 0.0.0.0:8000"

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://callcrm:callcrm_pass@postgres:5432/callcrm
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SECRET_KEY=change-me-in-production-please
      - DEBUG=1
    volumes:
      - ./backend:/app
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A crm worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
